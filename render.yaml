databases:
  - name: taskapp-db
    plan: free
    databaseName: taskapp
    user: taskapp

services:
  # Backend API
  - type: web
    name: taskapp-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: taskapp-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://taskapp-frontend.onrender.com
      - key: PYTHON_VERSION
        value: "3.12.0"

  # Frontend Static Site
  - type: web
    name: taskapp-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        value: https://taskapp-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
