services:
  # Backend API (SQLite)
  - type: web
    name: backend-tk2k
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        value: https://reactapp-fl67.onrender.com
      - key: PYTHON_VERSION
        value: "3.12.0"

  # Frontend Web Service
  - type: web
    name: reactapp-fl67
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: REACT_APP_API_URL
        value: https://backend-tk2k.onrender.com/api
      - key: NODE_VERSION
        value: "20"
