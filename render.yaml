databases:
  - name: taskapp-db
    plan: free
    databaseName: taskapp
    user: taskapp

services:
  # Backend API
  - type: web
    name: taskapp-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: taskapp-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://reactapp-fl67.onrender.com
      - key: PYTHON_VERSION
        value: "3.12.0"

  # Frontend Web Service
  - type: web
    name: reactapp-frontend
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: REACT_APP_API_URL
        value: https://taskapp-backend.onrender.com/api
      - key: NODE_VERSION
        value: "20"
