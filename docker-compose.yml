services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: taskapp
      POSTGRES_USER: taskuser
      POSTGRES_PASSWORD: taskpass123
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgres://taskuser:taskpass123@db:5432/taskapp
      SECRET_KEY: django-docker-secret-key-change-in-production
      DEBUG: "true"
      ALLOWED_HOSTS: "*"
      FRONTEND_URL: http://localhost:3000
    depends_on:
      - db
    volumes:
      - backend_media:/app/media

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_API_URL: http://localhost:8000/api
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
  backend_media:
