services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      SECRET_KEY: django-docker-secret-key-change-in-production
      DEBUG: "true"
      ALLOWED_HOSTS: "*"
      FRONTEND_URL: http://localhost:3000
    volumes:
      - backend_data:/app
      - backend_media:/app/media

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  backend_data:
  backend_media:
